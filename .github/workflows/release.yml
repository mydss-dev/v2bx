name: Build V2bX Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.asset_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_arch: "64"
            goos: linux
            goarch: amd64
          - asset_arch: "arm64-v8a"
            goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          GOEXPERIMENT: jsonv2
        run: |
          mkdir -p build_assets
          go mod download
          version="${GITHUB_REF_NAME:-dev}"
          go build -v -o build_assets/V2bX \
            -tags "sing xray hysteria2 with_quic with_grpc with_utls with_wireguard with_acme with_gvisor" \
            -trimpath \
            -ldflags "-X 'github.com/InazumaV/V2bX/cmd.version=${version}' -s -w -buildid="

      - name: Package
        run: |
          cd build_assets
          chmod +x V2bX
          cp ../example/config.json ./config.json
          cp ../example/dns.json ./dns.json
          printf '{"domainStrategy":"AsIs","rules":[]}' > route.json
          printf '[]' > custom_outbound.json
          printf '[]' > custom_inbound.json
          curl -fsSL -o geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat || touch geoip.dat
          curl -fsSL -o geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat || touch geosite.dat
          zip -r ../V2bX-linux-${{ matrix.asset_arch }}.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: V2bX-linux-${{ matrix.asset_arch }}.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: V2bX-linux-${{ matrix.asset_arch }}
          path: V2bX-linux-${{ matrix.asset_arch }}.zip
